name: Fetch Daily Weather Data

on:
  schedule:
    # Runs daily at 9 AM UTC
    - cron: '0 9 * * *'
  # Also let you trigger manually
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch weather data
        uses: githubocto/flat@v3
        with:
          http_url: https://api.open-meteo.com/v1/forecast?latitude=51.5&longitude=-0.0&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code&timezone=auto
          downloaded_filename: data/weather.json
